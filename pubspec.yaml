name: mirit_reminders
description: "Local reminder diary app for Mirit."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  drift: ^2.22.0
  drift_flutter: ^0.2.2
  path: ^1.9.0
  path_provider: ^2.1.5
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^3.0.0
  table_calendar: ^3.1.2
  intl: ^0.20.2
  uuid: ^4.5.1
  file_picker: ^8.1.7
  audioplayers: ^6.4.0
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  riverpod_lint: ^2.6.1
  custom_lint: ^0.7.4

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/icons/
